<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitHub Issues Tracker</title>

        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    </head>

    <body class="bg-gray-100 geist-font">

        <nav
            class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">

            <div class="flex items-center gap-2">

                <img src="./assets/github-logo.png"
                    alt="GitHub logo"
                    class="w-8 h-8">

                <h1 class="font-semibold text-lg">
                    GitHub Issues Tracker
                </h1>

            </div>

            <div class="flex items-center gap-4">

                <div class="flex items-center border rounded-md px-3 py-2">
                    <i
                        class="fa-solid fa-magnifying-glass text-gray-400 mr-2"></i>
                    <input type="text" placeholder="Search issues..."
                        class="outline-none">
                </div>

                <button class="bg-[#4A00FF] text-white px-4 py-2 rounded-md">
                    Search
                </button>

                <button class="bg-[#4A00FF] text-white px-4 py-2 rounded-md">
                    + New Issue
                </button>

            </div>

        </nav>

        <!-- MAIN CONTAINER -->

        <div class="max-w-6xl mx-auto mt-10">

            <!-- TABS -->

            <div class="bg-white p-4 rounded-lg shadow-sm">

                <div class="flex gap-2">

                    <button
                        class="bg-[#4A00FF] text-white px-6 py-2 rounded-md">
                        All
                    </button>

                    <button class="border px-6 py-2 rounded-md">
                        Open
                    </button>

                    <button class="border px-6 py-2 rounded-md">
                        Closed
                    </button>

                </div>

            </div>

            <!-- ISSUE COUNT -->

            <div
                class="bg-white mt-6 p-4 rounded-lg shadow-sm flex justify-between items-center">

                <div class="flex items-center gap-2 mb-1">
                    <img src="./assets/Aperture.png" alt="Aperture icon"
                        class="w-5 h-5">
                    <div>
                        <h2 class="font-semibold">50 Issues</h2>

                        <p class="text-sm text-gray-500">
                            Track and manage your project issues
                        </p>
                    </div>

                </div>

                <div class="flex gap-6 text-sm">

                    <span class="flex items-center gap-1">
                        <img src="./assets/Open-Status.png" alt="">
                        Open
                    </span>

                    <span class="flex items-center gap-1">
                        <img src="./assets/Closed- Status .png" alt="">
                        Closed
                    </span>

                </div>

            </div>

            <div
                id="issuesContainer"
                class="grid grid-cols-4 gap-6 mt-6">

                <div
                    class="bg-white rounded-lg shadow-sm border-t-4 border-green-500">

                    <!-- CARD BODY -->
                    <div class="p-4">

                        <!-- Header -->
                        <div class="flex justify-between items-center mb-3">

                            <img src="./assets/Closed-Status.png"
                                class="w-5 h-5" "
                                alt="Closed issue status icon">
                            <span
                                class="text-xs px-3 py-1 rounded-full bg-red-100 text-red-500 font-medium">
                                HIGH
                            </span>

                        </div>

                        <!-- Title -->
                        <h3 class="font-semibold text-gray-800 mb-2">
                            Fix Navigation Menu On Mobile Devices
                        </h3>

                        <!-- Description -->
                        <p class="text-sm text-gray-500 mb-4">
                            The navigation menu doesn't collapse properly on
                            mobile devices...
                        </p>

                        <!-- Labels -->
                        <div class="flex gap-2 mb-4">

                            <span
                                class="text-red-500 text-xs flex items-center gap-1">
                                <i class="fa-solid fa-bug"></i> BUG
                            </span>

                            <span
                                class="text-yellow-600 text-xs flex items-center gap-1">
                                <i class="fa-regular fa-circle-question"></i>
                                HELP WANTED
                            </span>

                            <span
                                class="text-green-600 text-xs flex items-center gap-1">
                                <i class="fa-solid fa-wand-magic-sparkles"></i>
                                ENHANCEMENT
                            </span>

                            <span
                                class="text-blue-600 text-xs flex items-center gap-1 border border-blue-600 px-2 py-1 rounded">
                                <i class="fa-solid fa-book"></i>
                                DOCUMENTATION
                            </span>

                        </div>

                    </div>

                    <div class="border-t px-4 py-3 text-xs text-gray-500">

                        <p>#1 by john_doe</p>
                        <p>1/15/2024</p>

                    </div>

                </div>

            </div>

        </div>

        <script src="./script/issues.js"></script>
    </body>
</html>
