<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GitHub Issues Tracker</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
            rel="stylesheet">
    </head>

    <body class="bg-gray-98 flex items-center justify-center min-h-screen geist-font">

        <div class="bg-white w-[500px] p-8 rounded-xl shadow-lg text-center">

            <div class="flex justify-center mb-4">
                <div class="bg-white p-5 rounded-full">
                    <img src="./assets/github-logo.png"
                        alt="GitHub logo"
                        class="w-20 h-20">
                </div>
            </div>

            <h1 class="text-xl font-semibold text-gray-800">
                GitHub Issues Tracker
            </h1>

            <p class="text-gray-500 text-sm mb-6">
                Sign in to manage your issues
            </p>

            <div class="text-left mb-4">
                <label class="text-sm font-medium">Username</label>
                <input id="username"
                    type="text"
                    placeholder="Enter Username"
                    class="w-full border rounded-md p-2 mt-1">
                <p class="text-[#4A00FF] text-xs mt-1">Default: admin</p>
            </div>

            <div class="text-left mb-4">
                <label class="text-sm font-medium">Password</label>
                <input id="password"
                    type="password"
                    placeholder="Enter Password"
                    class="w-full border rounded-md p-2 mt-1">
                <p class="text-[#4A00FF] text-xs mt-1">Default: admin123</p>
            </div>

            <button onclick="login()"
                class="w-full bg-[#4A00FF] text-white py-2.5 rounded-lg font-medium
            shadow-md transition-all duration-300
            hover:bg-[#3a00cc] hover:shadow-lg hover:scale-[1.02]">
                Sign In
            </button>

            <div class="flex items-center my-6">
                <div class="flex-1 border-t"></div>
                <span class="px-2 text-[#1F2937] text-sm">OR</span>
                <div class="flex-1 border-t"></div>
            </div>

            <div class="bg-gray-100 rounded-lg p-4 text-sm">
                <p class="text-gray-500 mb-2">Demo Credentials:</p>
                <p><b>Username:</b> admin</p>
                <p><b>Password:</b> admin123</p>
            </div>

        </div>

        <script src="./script/login.js"></script>
    </body>
</html>
